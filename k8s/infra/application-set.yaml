apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infrastructure
  namespace: argocd
  labels:
    dev.pc-tips: infrastructure
spec:
  generators:
    - git:
        repoURL: https://github.com/theepicsaxguy/homelab
        revision: main
        directories:
          - path: k8s/infra/dev/*
          - path: k8s/infra/staging/*
          - path: k8s/infra/prod/*
  template:
    metadata:
      name: '{{path.basename}}'
      labels:
        dev.pc-tips: infrastructure
        environment: '{{path.segments.2}}' # Will extract dev/staging/prod from path
    spec:
      project: infrastructure
      source:
        repoURL: https://github.com/theepicsaxguy/homelab
        targetRevision: main
        path: '{{path}}'
      destination:
        name: in-cluster
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
