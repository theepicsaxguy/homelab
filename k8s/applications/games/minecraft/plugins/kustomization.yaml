apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

configMapGenerator:
  - name: minecraft-bedrock
    literals:
      - TYPE=PAPER
      - VERSION=1.21.11
      - EULA=true
      - SERVER_PORT=25565
      - ONLINE_MODE=true
      - GEYSER_ENABLED=true
      - FLOODGATE=true
      - GEYSER_AUTH_TYPE=floodgate
      - TZ=Europe/Stockholm
      - MAX_PLAYERS=20
      - ALLOW_LIST=false
      - LEVEL_NAME=default
      - SEED=3256082097912188239
      - LEVEL_TYPE=DEFAULT
      - ENFORCE_SECURE_PROFILE=false
      - JVM_OPTS=-DGeyser.PrintSecureChatInformation=false
      - DIFFICULTY=normal
      - SYNC_SKIP_NEWER_IN_DESTINATION=false
      - ENABLE_STATUS=true
      - ENABLE_QUERY=true
      - SERVER_NAME=PixelStack
      - MOTD=§b§l✦ §d§lPixel§a§lStack §b§l✦§r\n§e§oCross-platform • Survival • Community
      - BUG_REPORT_LINK=https://github.com/theepicsaxguy/homelab/issues
      - PVP=true
      - SPAWN_PROTECTION=10
      - VIEW_DISTANCE=32
      - SIMULATION_DISTANCE=15
      - MAX_TICK_TIME=60000
      - RATE_LIMIT=0
      - NETWORK_COMPRESSION_THRESHOLD=256
      - PLAYER_IDLE_TIMEOUT=30
      - MEMORY=6G
      - USE_AIKAR_FLAGS=true
    files:
      - PLUGINS=plugins.txt
  # Config keys use path-style: path__to__file (__ = / under /data).
  # The init container copies these into /data so both plugin and server configs are managed.
  # Add a new config: add a configMapGenerator entry here and add its name to the plugin-configs projected volume in base/statefulset.yaml.
  - name: geyser-config
    files:
      - plugins__Geyser-Spigot__config.yml=geyser-config.yml
  - name: luckperms-config
    files:
      - plugins__LuckPerms__config.yml=luckperms-config.yml
  - name: luckperms-groups
    files:
      - plugins__LuckPerms__yaml-storage__groups__default.yml=luckperms-group-default.yml
      - plugins__LuckPerms__yaml-storage__groups__admin.yml=luckperms-group-admin.yml
  - name: essentialsx-config
    files:
      - plugins__Essentials__config.yml=essentialsx-config.yml
  - name: wildloaders-config
    files:
      - plugins__WildLoaders__config.yml=wildloaders-config.yml
  - name: bedrockgui-config
    files:
      - plugins__BedrockGUI__config.yml=bedrockgui-config.yml
  - name: customcommands-config
    files:
      - plugins__CustomCommands__config.yml=customcommands-config.yml
  - name: paper-world-defaults
    files:
      - config__paper-world-defaults.yml=paper-world-defaults.yml
