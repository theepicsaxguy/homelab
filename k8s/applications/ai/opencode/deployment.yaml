apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencode-web
  namespace: opencode
  labels:
    app: opencode-web
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: opencode-web
  template:
    metadata:
      labels:
        app: opencode-web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: installer
          image: node:24.13.0
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu

              SHARED_PREFIX="/shared"
              SHARED_CACHE="/shared/.cache"
              SHARED_NPM_CACHE="/shared/.npm"

              mkdir -p "$SHARED_PREFIX" "$SHARED_CACHE" "$SHARED_NPM_CACHE" "$SHARED_PREFIX/bin"

              if command -v curl >/dev/null 2>&1; then
                FETCH="curl -fsSL"
              elif command -v wget >/dev/null 2>&1; then
                FETCH="wget -q -O -"
              else
                echo "[ERROR] curl or wget required but not found"
                exit 1
              fi

              echo "[installer] Copying Node runtime into shared volume..."
              cp -R /usr/local/* "$SHARED_PREFIX/"

              export PATH="/shared/bin:/usr/local/bin:$PATH"
              export NPM_CONFIG_PREFIX="$SHARED_PREFIX"
              export NPM_CONFIG_CACHE="$SHARED_NPM_CACHE"

              # ---- KUSTOMIZE (latest) ----
              if ! command -v kustomize >/dev/null 2>&1; then
                ARCH="$(uname -m)"
                case "$ARCH" in
                  x86_64) KUSTOMIZE_ARCH="amd64" ;;
                  aarch64) KUSTOMIZE_ARCH="arm64" ;;
                  *) echo "[ERROR] Unsupported arch: $ARCH"; exit 1 ;;
                esac

                echo "[installer] Installing kustomize (latest)..."
                KUSTOMIZE_URL="$($FETCH https://api.github.com/repos/kubernetes-sigs/kustomize/releases/latest | \
                  grep browser_download_url | grep "linux_${KUSTOMIZE_ARCH}\.tar\.gz" | head -n1 | cut -d '"' -f4)"
                [ -n "$KUSTOMIZE_URL" ] || { echo "[ERROR] Could not resolve latest kustomize URL"; exit 1; }
                $FETCH "$KUSTOMIZE_URL" > /tmp/kustomize.tar.gz
                tar --no-same-owner -xzf /tmp/kustomize.tar.gz -C /tmp
                cp /tmp/kustomize "$SHARED_PREFIX/bin/"
                chmod 755 "$SHARED_PREFIX/bin/kustomize"
              fi
              echo "[installer] ✓ kustomize $(kustomize version 2>&1)"

              # ---- HELM (latest via official script) ----
              echo "[installer] Installing helm (latest via get-helm-4)..."
              $FETCH https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-4 > /tmp/get_helm.sh
              chmod 700 /tmp/get_helm.sh
              export HELM_INSTALL_DIR="$SHARED_PREFIX/bin"
              export USE_SUDO="false"
              export TAR_OPTIONS="--no-same-owner --no-same-permissions"
              /tmp/get_helm.sh
              echo "[installer] ✓ helm $(helm version --short 2>&1)"

              # ---- Playwright CLI + MCP ----
              echo "[installer] Installing Playwright CLI + MCP..."
              npm install -g playwright@latest @playwright/mcp@latest

              export PLAYWRIGHT_BROWSERS_PATH="$SHARED_CACHE/ms-playwright"
              npx playwright install

              echo "[installer] ✓ node $(node -v)"
              echo "[installer] ✓ npm $(npm -v)"
              echo "[installer] ✓ npx $(npx -v)"
              echo "[installer] ✓ playwright $(playwright --version 2>&1)"
              echo "[installer] ✅ All tools verified and ready!"
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: shared-tools
              mountPath: /shared
            - name: shared-cache
              mountPath: /shared/.cache
      containers:
      - name: opencode-web
        image: ghcr.io/chriswritescode-dev/opencode-manager:0.9.0
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        ports:
        - containerPort: 5003
        env:
        - name: OPENCODE_HOST
          value: "127.0.0.1"
        - name: AUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: app-opencode-secrets
              key: AUTH_SECRET
        - name: VAPID_PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              name: app-opencode-secrets
              key: VAPID_PUBLIC_KEY
        - name: VAPID_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: app-opencode-secrets
              key: VAPID_PRIVATE_KEY
        - name: AUTH_TRUSTED_ORIGINS
          value: "https://opencode.peekoff.com,http://localhost:5003,http://10.0.10.*:5003"
        - name: AUTH_SECURE_COOKIES
          value: "true"
        - name: PLAYWRIGHT_BROWSERS_PATH
          value: "/shared/.cache/ms-playwright"
        - name: NODE_OPTIONS
          value: "--max-old-space-size=512"
        volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: data
          mountPath: /app/data
        - name: shared-tools
          mountPath: /usr/local
        - name: shared-cache
          mountPath: /shared
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5003
          initialDelaySeconds: 40
          periodSeconds: 30
          timeoutSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5003
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 30
          failureThreshold: 5
        startupProbe:
          httpGet:
            path: /api/health
            port: 5003
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
      volumes:
      - name: workspace
        persistentVolumeClaim:
          claimName: opencode-workspace-pvc
      - name: data
        persistentVolumeClaim:
          claimName: opencode-data-pvc
      - name: shared-tools
        emptyDir:
          sizeLimit: 3Gi
      - name: shared-cache
        emptyDir:
          sizeLimit: 3Gi
