apiVersion: batch/v1
kind: CronJob
metadata:
  name: clear-entities
  namespace: minecraft
  labels:
    app.kubernetes.io/name: minecraft-bedrock
    app.kubernetes.io/component: maintenance
spec:
  schedule: "0 */2 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: minecraft-bedrock
            app.kubernetes.io/component: maintenance
        spec:
          restartPolicy: OnFailure
          serviceAccountName: minecraft-bedrock
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          containers:
            - name: rcon
              image: itzg/minecraft-server:java25-jdk
              command:
                - sh
                - -c
                - |
                  echo "Clearing snowballs..."
                  rcon-cli 'minecraft:kill @e[type=minecraft:snowball]' || true
                  echo "Clearing items..."
                  rcon-cli 'minecraft:kill @e[type=minecraft:item]' || true
                  echo "Done."
              env:
                - name: RCON_HOST
                  value: "minecraft-bedrock-0.minecraft-bedrock.minecraft.svc.cluster.local"
                - name: RCON_PORT
                  value: "25575"
                - name: RCON_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: minecraft-bedrock
                      key: RCON_PASSWORD
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
                seccompProfile:
                  type: RuntimeDefault
