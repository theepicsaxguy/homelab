apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: clusterwide-gateway-http
  labels:
    policy-type: audit-baseline
spec:
  endpointSelector: {}
  enableDefaultDeny:
    ingress: false
    egress: false
  description: "Allow HTTP/HTTPS and Qdrant traffic to/from gateway namespace cluster-wide"
  ingress:
  - fromEntities:
    - host
    - remote-node
    - ingress
    toPorts:
    - ports:
      - port: "80"
        protocol: TCP
      - port: "443"
        protocol: TCP
      - port: "6333"
        protocol: TCP
      - port: "6334"
        protocol: TCP
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.podNamespace: gateway
    toPorts:
    - ports:
      - port: "80"
        protocol: TCP
      - port: "443"
        protocol: TCP
      - port: "6333"
        protocol: TCP
      - port: "6334"
        protocol: TCP
