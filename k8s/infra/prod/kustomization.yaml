apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base

patches:
  - path: prod-patches.yaml
    target:
      kind: ConfigMap
      name: monitoring-config
  - path: prod-patches.yaml
    target:
      kind: ConfigMap
      name: network-config

namespace: argocd

labels:
  - includeSelectors: true
    pairs:
      environment: prod
      app.kubernetes.io/managed-by: argocd
