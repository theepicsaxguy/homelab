apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: arr
spec:
  replicas: 1  # Development uses single replica
  template:
    spec:
      containers:
      - name: .*  # This will match all containers
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        env:
        - name: LOG_LEVEL
          value: "debug"