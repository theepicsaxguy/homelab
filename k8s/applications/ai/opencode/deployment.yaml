apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencode-web
  namespace: opencode
  labels:
    app: opencode-web
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: opencode-web
  template:
    metadata:
      labels:
        app: opencode-web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: installer
          image: mcr.microsoft.com/playwright:v1.58.2-jammy
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu

              SHARED_BIN="/shared/bin"
              SHARED_CACHE="/shared/.cache"
              export PATH="$SHARED_BIN:$PATH"

              mkdir -p "$SHARED_BIN" "$SHARED_CACHE"

              if command -v curl >/dev/null 2>&1; then
                FETCH="curl -fsSL"
              elif command -v wget >/dev/null 2>&1; then
                FETCH="wget -q -O -"
              else
                echo "[ERROR] curl or wget required but not found"
                exit 1
              fi

              # kustomize (latest)
              if ! command -v kustomize >/dev/null 2>&1; then
                KUSTOMIZE_URL="$($FETCH https://api.github.com/repos/kubernetes-sigs/kustomize/releases/latest | \
                  grep browser_download_url | grep linux_amd64.tar.gz | head -n1 | cut -d '"' -f4)"
                [ -n "$KUSTOMIZE_URL" ] || { echo "[ERROR] Could not resolve latest kustomize URL"; exit 1; }
                $FETCH "$KUSTOMIZE_URL" > /tmp/kustomize.tar.gz
                tar --no-same-owner -xzf /tmp/kustomize.tar.gz -C /tmp
                cp /tmp/kustomize "$SHARED_BIN/"
                chmod 755 "$SHARED_BIN/kustomize"
              fi
              echo "[installer] ✓ kustomize $(kustomize version 2>&1)"

              # helm (latest via official script)
              echo "[installer] Installing helm (latest via get-helm-4)..."
              $FETCH https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-4 > /tmp/get_helm.sh
              chmod 700 /tmp/get_helm.sh

              export HELM_INSTALL_DIR="$SHARED_BIN"
              export USE_SUDO="false"
              export TAR_OPTIONS="--no-same-owner --no-same-permissions"

              /tmp/get_helm.sh

              echo "[installer] ✓ helm $(helm version --short 2>&1)"

              # Playwright browsers
              if [ ! -d "$SHARED_CACHE/ms-playwright" ]; then
                [ -d /ms-playwright ] || { echo "[ERROR] Playwright source not found"; exit 1; }
                cp -a /ms-playwright/ "$SHARED_CACHE/ms-playwright/"
              fi

              chmod 755 "$SHARED_BIN" 2>/dev/null || true
              chmod 755 "$SHARED_BIN"/* 2>/dev/null || true
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: shared-tools
              mountPath: /shared
      containers:
      - name: opencode-web
        image: ghcr.io/chriswritescode-dev/opencode-manager:0.9.0
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        ports:
        - containerPort: 5003
        env:
        - name: OPENCODE_HOST
          value: "127.0.0.1"
        - name: AUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: app-opencode-secrets
              key: AUTH_SECRET
        - name: VAPID_PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              name: app-opencode-secrets
              key: VAPID_PUBLIC_KEY
        - name: VAPID_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: app-opencode-secrets
              key: VAPID_PRIVATE_KEY
        - name: AUTH_TRUSTED_ORIGINS
          value: "https://opencode.peekoff.com,http://localhost:5003,http://10.0.10.*:5003"
        - name: AUTH_SECURE_COOKIES
          value: "true"
        - name: PATH
          value: "/shared/bin:/usr/local/bin:/usr/local/sbin:/usr/bin:/bin:/usr/local/bin"
        - name: PLAYWRIGHT_BROWSERS_PATH
          value: "/shared/.cache/ms-playwright"
        - name: NODE_OPTIONS
          value: "--max-old-space-size=512"
        volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: data
          mountPath: /app/data
        - name: shared-tools
          mountPath: /shared
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5003
          initialDelaySeconds: 40
          periodSeconds: 30
          timeoutSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5003
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 30
          failureThreshold: 5
        startupProbe:
          httpGet:
            path: /api/health
            port: 5003
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
      volumes:
      - name: workspace
        persistentVolumeClaim:
          claimName: opencode-workspace-pvc
      - name: data
        persistentVolumeClaim:
          claimName: opencode-data-pvc
      - name: shared-tools
        emptyDir:
          sizeLimit: 3Gi
