apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: home-assistant
  namespace: home-assistant
  labels:
    app.kubernetes.io/name: home-assistant
    app.kubernetes.io/instance: home-assistant
spec:
  serviceName: home-assistant
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: home-assistant
      app.kubernetes.io/instance: home-assistant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: home-assistant
        app.kubernetes.io/instance: home-assistant
    spec:
      securityContext:
        fsGroupChangePolicy: OnRootMismatch
      serviceAccountName: home-assistant
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      initContainers:
      - name: volume-permissions
        image: busybox:1.37
        command: ["sh", "-c", "chmod -R 755 /config && chown -R root:root /config"]
        volumeMounts:
        - name: data
          mountPath: /config
      containers:
        - name: home-assistant
          image: ghcr.io/home-assistant/home-assistant:2026.4.4
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8123
              name: http
              protocol: TCP
            - containerPort: 8124
              name: sia
              protocol: TCP
          env:
            - name: TZ
              value: Europe/Stockholm
          resources:
            requests:
              memory: 1Gi
            limits:
              memory: 3Gi
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
                - NET_BROADCAST
          volumeMounts:
            - name: data
              mountPath: /config
            - name: core-config
              mountPath: /config/configuration.yaml
              readOnly: true
              subPath: configuration.yaml
            - name: secrets
              mountPath: /config/secrets.yaml
              readOnly: true
              subPath: secrets.yaml

          livenessProbe:
            httpGet:
              path: /
              port: http
              scheme: HTTP
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
      volumes:
        - name: core-config
          configMap:
            name: ha-core-config
            items:
              - key: configuration.yaml
                path: configuration.yaml
        - name: secrets
          secret:
            secretName: hassio-secrets
            items:
              - key: secrets.yaml
                path: secrets.yaml
        - name: data
          persistentVolumeClaim:
            claimName: home-assistant-home-assistant-0
