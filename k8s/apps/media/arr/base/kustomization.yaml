apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ns.yaml
- lidarr
- prowlarr
- radarr
- sonarr
- torrent

configMapGenerator:
- name: common-env
  namespace: arr
  behavior: create
  literals:
  - TZ="Europe/Oslo"

labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/managed-by: argocd
    dev.pc-tips: media