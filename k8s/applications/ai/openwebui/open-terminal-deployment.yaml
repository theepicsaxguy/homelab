apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-terminal
  namespace: open-webui
  labels:
    app.kubernetes.io/name: open-terminal
    app.kubernetes.io/part-of: open-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: open-terminal
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: open-terminal
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: open-terminal
          image: ghcr.io/open-webui/open-terminal:sha-ff7fb06
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: '500m'
              memory: '1Gi'
            limits:
              cpu: '1000m'
              memory: '2Gi'
          env:
            - name: OPEN_TERMINAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-openwebui-open-terminal-api-key
                  key: OPEN_TERMINAL_API_KEY
          volumeMounts:
            - name: data
              mountPath: /home/user
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: open-terminal-data
