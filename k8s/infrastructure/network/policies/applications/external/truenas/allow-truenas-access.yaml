apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: truenas-access
  namespace: truenas
  labels:
    policy-type: external-audit
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: truenas
  description: "Allow TrueNAS storage management access"
  ingress:
  - fromEntities:
    - host
    - remote-node
    - ingress
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s:k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
  - toFQDNs:
    - matchName: "truenas.peekoff.com"
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
      - port: "80"
        protocol: TCP
