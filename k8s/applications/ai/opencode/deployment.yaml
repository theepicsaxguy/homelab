apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencode-web
  namespace: opencode
  labels:
    app: opencode-web
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: opencode-web
  template:
    metadata:
      labels:
        app: opencode-web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: installer
          image: mcr.microsoft.com/playwright:v1.58.2-jammy
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              
              # ============ PINNED VERSIONS ============
              KUSTOMIZE_VERSION="v5.8.1"
              HELM_VERSION="v4.1.1"
              SHARED_BIN="/shared/bin"
              SHARED_CACHE="/shared/.cache"
              
              # Expected checksums from GitHub release pages
              # Kustomize v5.8.1: https://github.com/kubernetes-sigs/kustomize/releases/tag/kustomize%2Fv5.8.1
              # Helm v4.1.1: https://github.com/helm/helm/releases/tag/v4.1.1
              KUSTOMIZE_SHA256="029a7f0f4e1932c52a0476cf02a0fd855c0bb85694b82c338fc648dcb53a819d"
              HELM_SHA256="e48b4f7de0cc75c8e96e1a122fb93556d48d468fd9f1892f1b3f989e4e0c1a23"
              
              # Cleanup temp on exit
              cleanup() {
                rm -f /tmp/kustomize.tar.gz /tmp/helm.tar.gz /tmp/checksums.txt
              }
              trap cleanup EXIT
              
              export PATH="$SHARED_BIN:$PATH"
              echo "[installer] Pinned versions: kustomize=$KUSTOMIZE_VERSION, helm=$HELM_VERSION"
              mkdir -p "$SHARED_BIN" "$SHARED_CACHE"
              
              # ============ DOWNLOAD WITH RETRY & BACKOFF ============
              download_with_verify() {
                local url="$1"
                local output="$2"
                local expected_sha256="$3"
                local max_attempts=3
                local attempt=1
                
                while [ $attempt -le $max_attempts ]; do
                  echo "[installer] Downloading $(basename $output) (attempt $attempt/$max_attempts)..."
                  if wget -q -O "$output" "$url" 2>/dev/null; then
                    # Verify checksum
                    actual_sha256=$(sha256sum "$output" | awk '{print $1}')
                    if [ "$actual_sha256" = "$expected_sha256" ]; then
                      echo "[installer] ✓ Checksum verified"
                      return 0
                    else
                      echo "[ERROR] Checksum mismatch for $(basename $output)"
                      echo "  Expected: $expected_sha256"
                      echo "  Got:      $actual_sha256"
                      rm -f "$output"
                    fi
                  fi
                  
                  attempt=$((attempt + 1))
                  if [ $attempt -le $max_attempts ]; then
                    delay=$((2 ** attempt - 2))
                    echo "[installer] Retrying in ${delay}s..."
                    sleep $delay
                  fi
                done
                
                echo "[ERROR] Failed to download and verify $(basename $output) after $max_attempts attempts"
                return 1
              }
              
              # ============ KUSTOMIZE INSTALLATION ============
              if ! command -v kustomize >/dev/null 2>&1; then
                echo "[installer] Installing kustomize $KUSTOMIZE_VERSION..."
                cd /tmp
                KUSTOMIZE_URL="https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
                download_with_verify "$KUSTOMIZE_URL" "kustomize.tar.gz" "$KUSTOMIZE_SHA256" || exit 1
                tar --no-same-owner -xzf kustomize.tar.gz
                cp kustomize "$SHARED_BIN/"
                chmod 755 "$SHARED_BIN/kustomize"
              fi
              
              # Verify kustomize version exactly
              echo "[installer] Verifying kustomize..."
              KUSTOMIZE_INSTALLED=$(kustomize version 2>&1)
              case "$KUSTOMIZE_INSTALLED" in
                *"$KUSTOMIZE_VERSION"*)
                  echo "[installer] ✓ kustomize $KUSTOMIZE_INSTALLED"
                  ;;
                *)
                  echo "[ERROR] kustomize version mismatch: expected $KUSTOMIZE_VERSION, got $KUSTOMIZE_INSTALLED"
                  exit 1
                  ;;
              esac
              
              # ============ HELM INSTALLATION ============
              if ! command -v helm >/dev/null 2>&1; then
                echo "[installer] Installing helm $HELM_VERSION..."
                cd /tmp
                HELM_URL="https://github.com/helm/helm/releases/download/${HELM_VERSION}/helm-${HELM_VERSION}-linux-amd64.tar.gz"
                download_with_verify "$HELM_URL" "helm.tar.gz" "$HELM_SHA256" || exit 1
                tar --no-same-owner -xzf helm.tar.gz
                cp linux-amd64/helm "$SHARED_BIN/"
                chmod 755 "$SHARED_BIN/helm"
              fi
              
              # Verify helm version exactly
              echo "[installer] Verifying helm..."
              HELM_INSTALLED=$(helm version --short 2>&1)
              if [ "${HELM_INSTALLED%%+*}" = "$HELM_VERSION" ]; then
                echo "[installer] ✓ helm $HELM_INSTALLED"
              else
                echo "[ERROR] helm version mismatch: expected $HELM_VERSION, got $HELM_INSTALLED"
                exit 1
              fi
              
              # ============ PLAYWRIGHT BROWSERS (FROM BASE IMAGE) ============
              if [ ! -d "$SHARED_CACHE/ms-playwright" ]; then
                if [ -d /ms-playwright ]; then
                  echo "[installer] Copying Playwright browsers from base image..."
                  cp -a /ms-playwright/ "$SHARED_CACHE/ms-playwright/"
                  echo "[installer] ✓ Playwright browsers ready"
                else
                  echo "[ERROR] Playwright source not found in base image"
                  exit 1
                fi
              else
                echo "[installer] ✓ Playwright already cached"
              fi
              
              # ============ CLEANUP PERMISSIONS ============
              # Set ownership to match runtime UID/GID (1000:1000 from pod securityContext)
              if [ "$(id -u)" = "0" ]; then
                chown -R 1000:1000 /shared
                echo "[installer] Ownership set to 1000:1000"
              fi
              
              # Make shared/bin readable and executable
              chmod 755 "$SHARED_BIN"
              chmod -R 755 "$SHARED_BIN"/* 2>/dev/null || true
              
              echo "[installer] ✅ All tools verified and ready!"
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: shared-tools
              mountPath: /shared
      containers:
      - name: opencode-web
        image: ghcr.io/chriswritescode-dev/opencode-manager:0.9.0
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        ports:
        - containerPort: 5003
        env:
        - name: OPENCODE_HOST
          value: "127.0.0.1"
        - name: AUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: app-opencode-secrets
              key: AUTH_SECRET
        - name: VAPID_PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              name: app-opencode-secrets
              key: VAPID_PUBLIC_KEY
        - name: VAPID_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: app-opencode-secrets
              key: VAPID_PRIVATE_KEY
        - name: AUTH_TRUSTED_ORIGINS
          value: "https://opencode.peekoff.com,http://localhost:5003,http://10.0.10.*:5003"
        - name: AUTH_SECURE_COOKIES
          value: "true"
        - name: PATH
          value: "/shared/bin:/usr/local/bin:/usr/local/sbin:/usr/bin:/bin:/usr/local/bin"
        - name: PLAYWRIGHT_BROWSERS_PATH
          value: "/shared/.cache/ms-playwright"
        - name: NODE_OPTIONS
          value: "--max-old-space-size=512"
        volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: data
          mountPath: /app/data
        - name: shared-tools
          mountPath: /shared
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5003
          initialDelaySeconds: 40
          periodSeconds: 30
          timeoutSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5003
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 30
          failureThreshold: 5
        startupProbe:
          httpGet:
            path: /api/health
            port: 5003
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
      volumes:
      - name: workspace
        persistentVolumeClaim:
          claimName: opencode-workspace-pvc
      - name: data
        persistentVolumeClaim:
          claimName: opencode-data-pvc
      - name: shared-tools
        emptyDir:
          sizeLimit: 3Gi
