apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: litellm-access
  namespace: litellm
  labels:
    policy-type: ai-audit
spec:
  endpointSelector:
    matchLabels:
      app: litellm
  description: "Allow LiteLLM proxy access"
  ingress:
  - fromEntities:
    - host
    - remote-node
    - ingress
    toPorts:
    - ports:
      - port: "4000"
        protocol: TCP
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: open-webui
    toPorts:
    - ports:
      - port: "4000"
        protocol: TCP
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: perplexica
    toPorts:
    - ports:
      - port: "4000"
        protocol: TCP
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: openclaw
    toPorts:
    - ports:
      - port: "4000"
        protocol: TCP
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: gpt-researcher
    toPorts:
    - ports:
      - port: "4000"
        protocol: TCP
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: pocket-tts
    toPorts:
    - ports:
      - port: "4000"
        protocol: TCP
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: karakeep
    toPorts:
    - ports:
      - port: "4000"
        protocol: TCP
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: litellm
        app: redis
    toPorts:
    - ports:
      - port: "6379"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: qdrant
        app: qdrant
    toPorts:
    - ports:
      - port: "6333"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: litellm
        app.kubernetes.io/name: postgresql
    toPorts:
    - ports:
      - port: "5432"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s:k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: auth
        app.kubernetes.io/name: authentik
    toPorts:
    - ports:
      - port: "9000"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: vllm-embed
    toPorts:
    - ports:
      - port: "8000"
        protocol: TCP
  - toFQDNs:
    - matchName: "api.anthropic.com"
    - matchName: "api.mistral.ai"
    - matchName: "api.cerebras.ai"
    - matchName: "api.tavily.com"
    - matchName: "api.openai.com"
    - matchName: "api.cloudflare.com"
    - matchName: "gateway.ai.cloudflare.com"
    - matchPattern: "*.openai.azure.com"
    - matchName: "sso.peekoff.com"
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
