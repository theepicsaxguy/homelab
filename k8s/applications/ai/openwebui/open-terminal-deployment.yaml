apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-terminal
  namespace: open-webui
  labels:
    app.kubernetes.io/name: open-terminal
    app.kubernetes.io/part-of: open-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: open-terminal
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: open-terminal
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: open-terminal
          image: ghcr.io/open-webui/open-terminal:sha-87b0dcf
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: '500m'
              memory: '1Gi'
            limits:
              cpu: '1000m'
              memory: '2Gi'
          env:
            - name: HOME
              value: /home/user
            - name: OPEN_TERMINAL_LOG_DIR
              value: /tmp/open-terminal/logs
            - name: OPEN_TERMINAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-openwebui-open-terminal-api-key
                  key: OPEN_TERMINAL_API_KEY
          volumeMounts:
            - name: data
              mountPath: /home/user
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: open-terminal-data
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
