apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base/arr

patchesStrategicMerge:
  - patches/app-deployment.yaml
  - patches/torrent-deployment.yaml
  - patches/lidarr-deployment.yaml
  - patches/prowlarr-deployment.yaml
  - patches/radarr-deployment.yaml
  - patches/sonarr-deployment.yaml

labels:
  - includeSelectors: true
    pairs:
      environment: dev
      app.kubernetes.io/managed-by: argocd
      dev.pc-tips: media
