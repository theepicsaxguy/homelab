apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: arr
spec:
  replicas: 3  # Production uses 3 replicas for high availability
  template:
    spec:
      containers:
      - name: .*  # This will match all containers
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi