apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base

patches:
  - path: monitoring-patch.yaml
    target:
      kind: ConfigMap
      name: monitoring-config
  - path: network-patch.yaml
    target:
      kind: ConfigMap
      name: network-config

namespace: argocd

labels:
  - includeSelectors: true
    pairs:
      environment: dev
      app.kubernetes.io/managed-by: argocd
