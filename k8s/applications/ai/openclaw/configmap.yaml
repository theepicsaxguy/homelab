apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: openclaw
  labels:
    app.kubernetes.io/name: openclaw
data:
  openclaw.json: |
    {
      "logging": {
        "level": "info",
        "file": "/var/log/openclaw/openclaw.log",
        "consoleLevel": "info",
        "consoleStyle": "pretty",
        "redactSensitive": "tools"
      },
      "messages": {
        "messagePrefix": "[openclaw]",
        "responsePrefix": ">",
        "ackReaction": "👀",
        "ackReactionScope": "group-mentions",
        "groupChat": {
          "mentionPatterns": ["@openclaw", "openclaw"],
          "historyLimit": 50
        },
        "queue": {
          "mode": "collect",
          "debounceMs": 1000,
          "cap": 20,
          "drop": "summarize"
        }
      },
      "session": {
        "scope": "per-sender",
        "reset": {
          "mode": "daily",
          "atHour": 4,
          "idleMinutes": 60
        },
        "resetTriggers": ["/new", "/reset"],
        "store": "~/.openclaw/agents/default/sessions/sessions.json",
        "typingIntervalSeconds": 5
      },
      "channels": {
        "slack": {
          "enabled": true,
          "botToken": "${SLACK_BOT_TOKEN}",
          "appToken": "${SLACK_APP_TOKEN}",
          "channels": {
            "#general": { "allow": true, "requireMention": true }
          },
          "dm": { "enabled": true, "allowFrom": ["U123"] },
          "slashCommand": {
            "enabled": true,
            "name": "openclaw",
            "sessionPrefix": "slack:slash",
            "ephemeral": true
          }
        }
      },
      "agents": {
        "defaults": {
          "workspace": "/workspace",
          "userTimezone": "America/Chicago",
          "model": {
            "primary": "litellm/claude-sonnet-4-20250514"
          },
          "thinkingDefault": "low",
          "verboseDefault": "off",
          "elevatedDefault": "on",
          "timeoutSeconds": 600,
          "typingIntervalSeconds": 5,
          "maxConcurrent": 3,
          "sandbox": {
            "mode": "non-main",
            "perSession": true,
            "workspaceRoot": "~/.openclaw/sandboxes",
            "docker": {
              "image": "openclaw-sandbox:bookworm-slim",
              "workdir": "/workspace",
              "readOnlyRoot": true,
              "tmpfs": ["/tmp", "/var/tmp", "/run"],
              "network": "none",
              "user": "1000:1000"
            },
            "browser": { "enabled": false }
          }
        },
        "list": [
          {
            "id": "default",
            "default": true,
            "identity": {
              "name": "Samantha",
              "theme": "helpful sloth",
              "emoji": "🦥"
            },
            "groupChat": {
              "mentionPatterns": ["@openclaw", "openclaw"],
              "historyLimit": 50
            }
          }
        ]
      },
      "tools": {
        "allow": ["exec", "process", "read", "write", "edit", "apply_patch"],
        "deny": ["browser", "canvas"],
        "exec": {
          "backgroundMs": 10000,
          "timeoutSec": 1800,
          "cleanupMs": 1800000
        },
        "elevated": {
          "enabled": true,
          "allowFrom": {
            "whatsapp": ["+15555550123"],
            "telegram": ["123456789"],
            "discord": ["steipete"],
            "slack": ["U123"],
            "signal": ["+15555550123"],
            "imessage": ["user@example.com"],
            "webchat": ["session:demo"]
          }
        }
      },
      "models": {
        "mode": "merge",
        "providers": {
          "litellm": {
            "api": "openai-completions",
            "baseUrl": "http://litellm.litellm.svc.cluster.local:80/v1",
            "apiKey": "${LITELLM_API_KEY}",
            "models": [
              { "id": "claude-sonnet-4-20250514", "name": "claude-sonnet-4-20250514" }
            ]
          }
        }
      },
      "gateway": {
        "mode": "local",
        "port": 18789,
        "bind": "lan",
        "trustedProxies": ["10.244.0.0/16"],
        "controlUi": {
          "enabled": true,
          "basePath": "/openclaw",
          "allowedOrigins": ["https://openclaw.peekoff.com"]
        },
        "auth": {
          "mode": "token",
          "token": "${OPENCLAW_GATEWAY_TOKEN}",
          "allowTailscale": true
        }
      }
    }
