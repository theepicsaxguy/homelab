apiVersion: v1
kind: ConfigMap
metadata:
  name: monitoring-config
  namespace: monitoring
data:
  retention.period: "7d"
  storage.size: "50Gi"
  environment: "dev"
  log.level: "debug"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: network-config
  namespace: network
data:
  environment: "dev"
  ingress.replicas: "1"
  cilium.debug: "true"