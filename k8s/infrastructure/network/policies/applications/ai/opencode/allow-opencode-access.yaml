apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: opencode-access
  namespace: opencode
  labels:
    policy-type: ai-audit
spec:
  endpointSelector:
    matchLabels:
      app: opencode-web
  description: "Allow OpenCode access"
  ingress:
  - fromEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: "5003"
        protocol: TCP
  - fromEndpoints:
    - matchLabels:
        app: opencode-web
        k8s:io.kubernetes.pod.namespace: opencode
    toPorts:
    - ports:
      - port: "8931"
        protocol: TCP
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s:k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
  - toCIDR: ["10.0.0.0/8"]
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
