apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: opencode-initcontainer-root
  namespace: opencode
  annotations:
    description: "Exception for OpenCode initContainer that requires root to install Playwright browsers, Kustomize, and Helm."
spec:
  match:
    resources:
      kinds:
        - Deployment
      namespaces:
        - opencode
      names:
        - opencode-web
  exceptions:
    - policyName: nsa-hardening-all-namespaces
      ruleNames:
        - require-non-root-containers
        - require-read-only-root-filesystem
