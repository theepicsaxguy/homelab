apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-proxy
  namespace: open-webui
  labels:
    app: mcp-proxy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mcp-proxy
  template:
    metadata:
      labels:
        app: mcp-proxy
    spec:
      hostNetwork: false
      hostPID: false
      hostIPC: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mcp-proxy
          image: ghcr.io/tbxark/mcp-proxy:v0.43.2
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']
          env:
            - name: MCP_PROXY_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: app-openwebui-mcp-proxy-auth
                  key: MCP_PROXY_AUTH_TOKEN
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: mcp-proxy-config
              mountPath: /config
              readOnly: true
            - name: mcp-proxy-data
              mountPath: /app/.mcpo
          resources:
            requests:
              cpu: '500m'
              memory: '1Gi'
            limits:
              cpu: '1000m'
              memory: '2Gi'
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 512Mi
        - name: mcp-proxy-config
          configMap:
            name: mcp-proxy-config
        - name: mcp-proxy-data
          emptyDir:
            sizeLimit: 1Gi
